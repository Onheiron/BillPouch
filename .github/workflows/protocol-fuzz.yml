name: Protocol Fuzz

on:
  push:
    branches: [main]
    paths:
      - "crates/bp-core/src/control/**"
      - "agents/protocol/**"
  schedule:
    # Nightly at 04:00 UTC
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  fuzz:
    name: Control socket protocol fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reuse smoke compose for a single-node target
      - name: Build and start single node
        run: docker compose -f docker-compose.smoke.yml up --build -d node-pouch

      - name: Wait for daemon
        run: sleep 30

      - name: Install socat in container
        run: docker exec bp-pouch bash -c "apt-get update -qq && apt-get install -y -qq socat"

      - name: Run protocol fuzzer
        run: |
          chmod +x agents/lib/assert.sh agents/protocol/fuzz_control.sh
          ./agents/protocol/fuzz_control.sh bp-pouch

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.smoke.yml logs bp-pouch --no-color | tail -100

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.smoke.yml down -v

      - name: Open issue on crash
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🐛 Protocol fuzz: daemon crash detected — ${new Date().toISOString().split('T')[0]}`,
              body: `The nightly protocol fuzz test caused a daemon crash.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["protocol", "crash", "bug"]
            });
