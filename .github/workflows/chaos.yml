name: Chaos Tests

on:
  schedule:
    # Nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      level:
        description: "Chaos level (l1 | l2 | l3 | all)"
        default: "all"

concurrency:
  group: chaos
  cancel-in-progress: false   # never skip chaos — let it complete

jobs:
  chaos:
    name: Chaos (${{ github.event.inputs.level || 'all' }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install iptables tools (for L2 partition)
        run: sudo apt-get install -y iptables iproute2

      - name: Build and start chaos cluster
        run: docker compose -f docker-compose.chaos.yml up --build -d

      - name: Wait for initial startup
        run: sleep 15

      - name: Run chaos scenarios
        run: |
          chmod +x agents/lib/assert.sh agents/chaos/run_chaos.sh
          ./agents/chaos/run_chaos.sh "${{ github.event.inputs.level || 'all' }}"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.chaos.yml logs --no-color

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-logs-${{ github.run_number }}
          path: "*.log"
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.chaos.yml down -v

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔥 Chaos test failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Nightly chaos run failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nLevel: ${{ github.event.inputs.level || 'all' }}`,
              labels: ["chaos-failure", "bug"]
            });
