name: Benchmarks

on:
  push:
    branches: [main]
    paths:
      - "crates/bp-core/src/coding/**"
      - "crates/bp-core/src/storage/encryption.rs"
      - "crates/bp-core/benches/**"
      - "Cargo.lock"
  schedule:
    # Weekly on Sunday at 04:00 UTC
    - cron: "0 4 * * 0"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: Criterion benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-bench-

      - name: Run benchmarks
        run: cargo bench -p bp-core -- --output-format bencher | tee bench-output.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: BillPouch bp-core benchmarks
          tool: cargo
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: "120%"
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: "@Onheiron"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report-${{ github.run_number }}
          path: target/criterion/
          if-no-files-found: ignore
