name: Architecture Drift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  drift:
    name: Architecture invariants
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run drift check
        run: |
          chmod +x agents/lib/assert.sh agents/drift/check_drift.sh
          ./agents/drift/check_drift.sh

      - name: Annotate PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Architecture drift detected.** This PR introduces code that violates the architectural invariants defined in `AGENTS.md`. Please check the `Architecture Drift` job for details.'
            });
