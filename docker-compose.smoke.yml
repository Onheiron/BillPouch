## BillPouch — Smoke-test cluster
## Usage:
##   docker compose -f docker-compose.smoke.yml up --build -d
##   ./smoke/smoke-test.sh
##   docker compose -f docker-compose.smoke.yml down

services:
  # ── Node 1: will become Pouch (storage) ────────────────────────────────────
  node-pouch:
    build: .
    container_name: bp-pouch
    hostname: bp-pouch
    environment:
      NODE_NAME: "carlo-pouch"
      NETWORK: "smoketest"
      RUST_LOG: "bp_core=debug,bp_cli=info"
    networks:
      - bp-lan

  # ── Node 2: will become Bill (file I/O) ───────────────────────────────────
  node-bill:
    build: .
    container_name: bp-bill
    hostname: bp-bill
    environment:
      NODE_NAME: "marco-bill"
      NETWORK: "smoketest"
      RUST_LOG: "bp_core=debug,bp_cli=info"
    networks:
      - bp-lan

  # ── Node 3: will become Post (relay) ──────────────────────────────────────
  node-post:
    build: .
    container_name: bp-post
    hostname: bp-post
    environment:
      NODE_NAME: "lucia-post"
      NETWORK: "smoketest"
      RUST_LOG: "bp_core=debug,bp_cli=info"
    networks:
      - bp-lan

networks:
  bp-lan:
    driver: bridge
